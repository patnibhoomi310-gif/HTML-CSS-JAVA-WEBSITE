<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flower Bouquet Surprise 💐</title>


<link rel="stylesheet" href="style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">


</head>


<body>


<!-- Background Sparkles -->

<div class="sparkles"></div>



<div class="bouquet-container">



    <!-- Cover -->

    <div class="cover active" id="cover">


        <div class="closed-bouquet">

            🎀

            <div class="buds">

                🌹🌷🌸

            </div>

        </div>



        <h1>
            A Beautiful Bouquet For You 💐
        </h1>


        <p>
            A little surprise filled with flowers and love ❤️
        </p>


        <button onclick="openBouquet()">
            Open Bouquet 🌸
        </button>


    </div>





    <!-- Bouquet Page -->


    <div class="flower-page" id="flowerPage">


        <div class="flowers">


            <div class="flower flower1">
                🌹
            </div>


            <div class="flower flower2">
                🌷
            </div>


            <div class="flower flower3">
                🌸
            </div>


            <div class="flower flower4">
                🌺
            </div>


            <div class="flower flower5">
                🌼
            </div>


        </div>





        <div class="wrap">

            🎀

        </div>





        <h1>
            For Someone Special ❤️
        </h1>



        <button onclick="showMessage()">
            Open Message 💌
        </button>



    </div>







    <!-- Message Card -->


    <div class="message-card" id="message">


        <div class="card">


            <h1>
                💖 A Small Note
            </h1>



            <p>

                Just like these flowers,
                you make every moment beautiful.

                <br><br>

                This bouquet carries lots of love,
                happiness and smiles for you 🌸

            </p>



            <div class="heart">
                ❤️
            </div>



        </div>



        <button onclick="closeGift()">
            Close Bouquet ✨
        </button>



    </div>





</div>





<script src="script.js"></script>


</body>

</html>
