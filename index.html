<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khabar News</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="main-nav container flex">

    <!-- LOGO -->
    <div class="logo-section">
      <img src="assets/logo.png" alt="Logo">
      <h2>Khabar News</h2>
    </div>

    <!-- SEARCH + SAVED -->
    <div class="flex" style="gap:15px; align-items:center;">
      <div class="search-bar flex">
        <input type="text" class="news-input" placeholder="Search news...">
        <button class="search-button">Search</button>
      </div>
      <div>
        <button id="saved-btn">Saved</button>
      </div>
    </div>

    <!-- NAV LINKS -->
    <ul class="flex nav-links">
      <li class="hover-link navitem">Home</li>
      <li class="hover-link navitem">IPL</li>
      <li class="hover-link navitem">Finance</li>
      <li class="hover-link navitem">Politics</li>
    </ul>

  </div>
</nav>

<!-- MAIN SECTION -->
<main>
  <div class="cards-container container flex" id="cards-container">
  </div>
</main>

<!-- NEWS CARD TEMPLATE -->
<template id="template-news-card">
  <div class="card">
    <img class="news-img" src="" alt="News Image">
    <div class="card-content">
      <h3 class="news-title"></h3>
      <p class="news-source"></p>
      <p class="news-desc"></p>
      <a class="news-link" target="_blank">Read More</a>
      <button class="save-btn">❤️ Save</button>
    </div>
  </div>
</template>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">

    <div class="footer-left">
      <h2>Khabar News</h2>
      <p>Latest news from around the world.</p>
    </div>

    <div class="footer-links">
      <h3>Quick Links</h3>
      <p>Home</p>
      <p>IPL</p>
      <p>Finance</p>
      <p>Politics</p>
    </div>

    <div class="footer-social">
      <h3>Follow Us</h3>
      <p>Instagram</p>
      <p>Facebook</p>
      <p>Twitter</p>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Khabar News | All Rights Reserved</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
