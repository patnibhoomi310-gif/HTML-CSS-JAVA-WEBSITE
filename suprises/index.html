<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Operation Save Teddy ❤️</title>

<link rel="stylesheet" href="index.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- ===========================
BACKGROUND
=========================== -->

<div class="bg">

<div id="stars"></div>

<div id="particles"></div>

<div id="hearts"></div>

<div class="gradient"></div>

<div class="noise"></div>

</div>

<!-- ===========================
CURSOR GLOW
=========================== -->

<div id="cursorGlow"></div>

<!-- ===========================
INTRO OVERLAY
=========================== -->

<section id="intro">

<div class="introLogo">

<div class="logoCircle">

❤️

</div>

<h1>

Operation Save Teddy

</h1>

<p>

Loading Secret Mission...

</p>

</div>

</section>

<!-- ===========================
MAIN SCREEN
=========================== -->

<main id="mainScreen">

<div class="glassWindow">

<!-- HEADER -->

<div class="windowHeader">

<div class="leftDots">

<span class="red"></span>

<span class="yellow"></span>

<span class="green"></span>

</div>

<div class="windowTitle">

Birthday Mission.exe

</div>

</div>

<!-- TERMINAL -->

<div class="terminal">

<p id="line1"></p>

<p id="line2"></p>

<p id="line3"></p>

<p id="line4"></p>

<p id="line5"></p>

<p id="line6"></p>

<p id="line7"></p>

<p id="line8"></p>

</div>

<!-- LOADING -->

<div class="loadingArea">

<div class="loadingBar">

<div id="progressBar"></div>

</div>

<span id="percent">

0%

</span>

</div>

<!-- BUTTON -->

<button id="startMission">

START MISSION

</button>

</div>

</main>

<!-- ===========================
TEDDY
=========================== -->

<section id="teddySection">

<div class="teddy">

<div class="ear leftEar"></div>

<div class="ear rightEar"></div>

<div class="head">

<div class="eye leftEye"></div>

<div class="eye rightEye"></div>

<div class="nose"></div>

<div class="mouth"></div>

</div>

<div class="body">

<div class="heart">

❤️

</div>

</div>

<div class="hand leftHand"></div>

<div class="hand rightHand"></div>

<div class="leg leftLeg"></div>

<div class="leg rightLeg"></div>

</div>

<div class="speech">

<p id="teddyText">

...

</p>

</div>

</section>
<!-- ===========================
MISSION CARD
=========================== -->

<div id="missionCard">

    <div class="missionBox">

        <h2>🧸 Secret Mission</h2>

        <p>

            Birthday Monster 😈 has kidnapped Teddy...

            <br><br>

            Complete every challenge to unlock your

            final birthday surprise. ❤️

        </p>

        <button id="acceptMission">

            ACCEPT MISSION

        </button>

    </div>

</div>

<!-- ===========================
TOP BUTTONS
=========================== -->

<div class="topButtons">

<button id="musicBtn">

🎵

</button>

<button id="fullscreenBtn">

⛶

</button>

</div>

<!-- ===========================
SCREEN TRANSITION
=========================== -->

<div id="transitionScreen">

<div class="loaderCircle"></div>

<h2>

Preparing Mission...

</h2>

</div>

<!-- ===========================
AUDIO
=========================== -->

<audio
id="bgMusic"
loop>

<source
src="sounds/love.mp3"
type="audio/mpeg">

</audio>

<audio
id="clickSound">

<source
src="sounds/click.mp3"
type="audio/mpeg">

</audio>

<!-- ===========================
FOOTER
=========================== -->

<footer>

Made with ❤️ only for You

</footer>

<!-- ===========================
JAVASCRIPT
=========================== -->

<script src="index.js"></script>

</body>

</html>
